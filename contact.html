<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contactez-nous — Découvrez la France">
  <title>Contact — Découvrez la France</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'><text y='32' font-size='32'>🇫🇷</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .contact-page {
      max-width: 700px;
      margin: 0 auto;
      padding: calc(var(--header-height) + 3rem) 1.5rem 3rem;
    }

    .contact-hero {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .contact-hero h1 {
      font-family: var(--font-heading);
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 800;
      color: var(--blue);
      margin-bottom: 0.5rem;
    }

    body.dark-mode .contact-hero h1 { color: var(--blue-soft); }

    .contact-hero p {
      color: var(--text-secondary);
      font-size: 1rem;
    }

    .contact-form {
      background: var(--bg-card);
      backdrop-filter: var(--glass-blur);
      border: var(--glass-border);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: var(--shadow-md);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.95rem;
      outline: none;
      transition: all var(--transition-fast);
      resize: vertical;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--blue-soft);
      box-shadow: 0 0 0 3px rgba(0, 35, 149, 0.1);
    }

    body.dark-mode .form-group input:focus,
    body.dark-mode .form-group textarea:focus {
      box-shadow: 0 0 0 3px rgba(58, 95, 199, 0.2);
    }

    .form-group textarea {
      min-height: 140px;
    }

    .submit-btn {
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--blue), var(--blue-soft));
      color: var(--white);
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-fast);
      box-shadow: var(--shadow-sm);
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--blue-soft);
      margin-bottom: 2rem;
      padding: 0.5rem 1rem;
      border-radius: 10px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      transition: all var(--transition-fast);
      text-decoration: none;
    }

    .back-link:hover {
      background: var(--blue);
      color: var(--white);
      transform: translateX(-3px);
    }
  </style>
</head>
<body>
  <div class="bg-animated"></div>

  <!-- Header -->
  <header class="header" id="header">
    <a href="index.html" class="header__logo" style="text-decoration:none;">
      Découvrez la <span class="accent">France</span>
    </a>
    <div class="header__controls" id="header-controls">
      <div class="search-container">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="search-input"
               placeholder="Rechercher une région, ville…"
               autocomplete="off">
        <div class="search-results" id="search-results"></div>
      </div>
      <a href="contact.html" class="nav-link">📬 Contact</a>
      <button class="theme-toggle" id="theme-toggle" aria-label="Changer le thème"></button>
    </div>
  </header>

  <main class="contact-page">
    <a href="index.html" class="back-link">← Retour à la carte</a>

    <div class="contact-hero">
      <h1>📬 Contactez-nous</h1>
      <p>Une question ou une suggestion ? Écrivez-nous !</p>
    </div>

    <form class="contact-form" onsubmit="event.preventDefault(); alert('Merci pour votre message, Nalin vous répondra bientôt ! 🇫🇷'); this.reset();">
      <div class="form-group">
        <label for="name">Nom complet</label>
        <input type="text" id="name" placeholder="Votre nom" required>
      </div>
      <div class="form-group">
        <label for="email">Adresse e-mail</label>
        <input type="email" id="email" placeholder="votre@email.com" required>
      </div>
      <div class="form-group">
        <label for="subject">Sujet</label>
        <input type="text" id="subject" placeholder="De quoi souhaitez-vous parler ?">
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" placeholder="Écrivez votre message ici…" required></textarea>
      </div>
      <button type="submit" class="submit-btn">Envoyer le message ✉️</button>
    </form>
  </main>

  <footer class="footer">
    <p>Made by Nalin M <span class="heart">❤️</span> </p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
